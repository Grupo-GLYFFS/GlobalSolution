<!DOCTYPE html>

<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Log in • DataOrbit</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="icon" type="image/png" href="../assets/favicon/favicon-light.png" media="(prefers-color-scheme: light)">

  <link rel="icon" type="image/png" href="../assets/favicon/favicon-light.png" media="(prefers-color-scheme: dark)">

  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

  <script src="../javascript/utils/themeManager.js"></script>

  <script src="../javascript/utils/language.js?v=2"></script>

  <script src="https://cdn.tailwindcss.com"></script>

  <script src="../javascript/tailwind.config.js"></script>

</head>

<body class="font-sans text-black dark:text-gray-100 bg-gray-50 dark:bg-black antialiased relative min-h-screen flex items-center justify-center p-6">

  <div class="absolute inset-0 z-0 pointer-events-none"><img src="../assets/backgrounds/login-page-background.png" class="w-full h-full object-cover opacity-100 dark:opacity-80" alt="Background"></div>

  <div class="w-full max-w-md bg-white/80 dark:bg-white/10 backdrop-blur-xl border border-white/40 dark:border-white/10 rounded-3xl shadow-xl dark:shadow-2xl p-8 sm:p-10 relative z-10">

    <div class="flex justify-center mb-8">

      <a href="../index.html" class="hover:opacity-80 transition-opacity">

        <img src="../assets/logo/dataorbit-logo-3.png" alt="DataOrbit Logo" class="h-10 dark:brightness-0 dark:invert">

      </a>

    </div>

    <ul id="auth-tabs" class="flex p-1 bg-gray-200/50 dark:bg-white/5 rounded-xl mb-8 border border-gray-300/50 dark:border-white/5" data-tabs-toggle="#auth-tab-content" role="tablist" data-active-classes=" " data-inactive-classes=" ">

      <li class="flex-1" role="presentation">

        <button id="tab-login" data-tabs-target="#state-login" type="button" role="tab" aria-controls="state-login" aria-selected="true" class="w-full py-3 text-base font-bold rounded-lg transition-all aria-selected:bg-white dark:aria-selected:bg-white aria-selected:text-black dark:aria-selected:text-black aria-selected:shadow-md text-gray-500 dark:text-white/50 hover:text-black dark:hover:text-white hover:bg-gray-100 dark:hover:bg-white/5 aria-selected:hover:bg-white dark:aria-selected:hover:bg-white aria-selected:hover:text-black dark:aria-selected:hover:text-black tracking-heading" data-lang="nav_login">Log in</button>

      </li>

      <li class="flex-1" role="presentation">

        <button id="tab-signup" data-tabs-target="#state-signup" type="button" role="tab" aria-controls="state-signup" aria-selected="false" class="w-full py-3 text-base font-bold rounded-lg transition-all aria-selected:bg-white dark:aria-selected:bg-white aria-selected:text-black dark:aria-selected:text-black aria-selected:shadow-md text-gray-500 dark:text-white/50 hover:text-black dark:hover:text-white hover:bg-gray-100 dark:hover:bg-white/5 aria-selected:hover:bg-white dark:aria-selected:hover:bg-white aria-selected:hover:text-black dark:aria-selected:hover:text-black tracking-heading" data-lang="nav_signup">Sign up</button>

      </li>

    </ul>

    <div id="auth-tab-content">

      <div id="state-login" class="hidden animate-fade-in" role="tabpanel" aria-labelledby="tab-login">

      <form onsubmit="event.preventDefault(); displayErrorMessage('password');">

        <div class="mb-5">

          <label class="block text-xs font-medium text-gray-700 dark:text-white/80 mb-2" data-lang="login_email_label">Email address</label>

          <input type="email" data-lang="login_email_placeholder" class="w-full bg-white dark:bg-white/5 border border-gray-300 dark:border-white/10 rounded-xl px-4 py-3 text-black dark:text-white placeholder-gray-400 dark:placeholder-white/30 focus:border-black dark:focus:border-gray-500 focus:ring-1 focus:ring-black dark:focus:ring-gray-500 outline-none transition-all" placeholder="you@company.com" required>

        </div>

        <div class="mb-8">

          <div class="flex justify-between items-center mb-2">

            <label class="block text-xs font-medium text-gray-700 dark:text-white/80" data-lang="login_password_label">Password</label>

            <a href="#" class="text-xs text-gray-500 hover:text-black dark:text-gray-400 dark:hover:text-white font-medium transition-colors" data-lang="login_forgot_password">Forgot your password?</a>

          </div>

          <input type="password" class="w-full bg-white dark:bg-white/5 border border-gray-300 dark:border-white/10 rounded-xl px-4 py-3 text-black dark:text-white focus:border-black dark:focus:border-gray-500 focus:ring-1 focus:ring-black dark:focus:ring-gray-500 outline-none transition-all" required>

        </div>

        <button type="submit" class="w-full py-4 bg-black dark:bg-white text-white dark:text-black font-bold rounded-xl hover:bg-gray-800 dark:hover:bg-gray-200 transition-colors text-base tracking-heading" data-lang="nav_login">Log in</button>

        <p class="text-center mt-6 text-xs text-gray-500 dark:text-white/50">

          <span data-lang="login_dont_have">Don't have an account? </span><a href="#" onclick="document.getElementById('tab-signup').click()" class="text-black dark:text-white hover:underline font-medium" data-lang="nav_signup">Sign up</a>

        </p>

      </form>

      </div>

      <div id="state-signup" class="hidden animate-fade-in" role="tabpanel" aria-labelledby="tab-signup">

        <form onsubmit="event.preventDefault(); displaySuccessMessage();">

        <div class="mb-4">

          <label class="block text-xs font-medium text-gray-700 dark:text-white/80 mb-2" data-lang="signup_fullname_label">Full name</label>

          <input type="text" data-lang="signup_fullname_placeholder" class="w-full bg-white dark:bg-white/5 border border-gray-300 dark:border-white/10 rounded-xl px-4 py-3 text-black dark:text-white placeholder-gray-400 dark:placeholder-white/30 focus:border-black dark:focus:border-gray-500 focus:ring-1 focus:ring-black dark:focus:ring-gray-500 outline-none transition-all" placeholder="John Doe" required>

        </div>

        <div class="mb-4">

          <label class="block text-xs font-medium text-gray-700 dark:text-white/80 mb-2" data-lang="login_email_label">Email address</label>

          <input type="email" data-lang="login_email_placeholder" class="w-full bg-white dark:bg-white/5 border border-gray-300 dark:border-white/10 rounded-xl px-4 py-3 text-black dark:text-white placeholder-gray-400 dark:placeholder-white/30 focus:border-black dark:focus:border-gray-500 focus:ring-1 focus:ring-black dark:focus:ring-gray-500 outline-none transition-all" placeholder="you@company.com" required>

        </div>

        <div class="mb-8">

          <label class="block text-xs font-medium text-gray-700 dark:text-white/80 mb-2" data-lang="login_password_label">Password</label>

          <input type="password" class="w-full bg-white dark:bg-white/5 border border-gray-300 dark:border-white/10 rounded-xl px-4 py-3 text-black dark:text-white focus:border-black dark:focus:border-gray-500 focus:ring-1 focus:ring-black dark:focus:ring-gray-500 outline-none transition-all" required>

        </div>

        <button type="submit" class="w-full py-4 bg-black dark:bg-white text-white dark:text-black font-bold rounded-xl hover:bg-gray-800 dark:hover:bg-gray-200 transition-colors text-base tracking-heading" data-lang="signup_btn">Create account</button>

        <p class="text-center mt-6 text-xs text-gray-500 dark:text-white/50">

          <span data-lang="signup_already_have">Already have an account? </span><a href="#" onclick="document.getElementById('tab-login').click()" class="text-black dark:text-white hover:underline font-medium" data-lang="nav_login">Log in</a>

        </p>

        </form>

      </div>

    </div>

    <div id="state-error-email" class="hidden animate-fade-in">

      <form onsubmit="event.preventDefault(); voltarParaLogin();">

        <div class="mb-5">

          <label class="block text-xs font-medium text-gray-700 dark:text-white/80 mb-2" data-lang="login_email_label">Email address</label>

          <input type="email" value="unknown@email.com" class="w-full bg-accent-red/10 border border-accent-red text-black dark:text-white rounded-xl px-4 py-3 focus:border-accent-red focus:ring-1 focus:ring-accent-red outline-none transition-all">

          <p class="mt-2 text-xs text-accent-red font-medium"><span data-lang="login_no_account">No account found with this email.</span> <a href="#" onclick="returnToSignupView()" class="text-black dark:text-white hover:underline"><span data-lang="login_sign_up">Sign up?</span></a></p>

        </div>

        <div class="mb-8">

          <div class="flex justify-between items-center mb-2">

            <label class="block text-xs font-medium text-gray-700 dark:text-white/80" data-lang="login_password_label">Password</label>

            <a href="#" class="text-xs text-gray-500 dark:text-gray-400 hover:text-black dark:hover:text-white font-medium transition-colors" data-lang="login_forgot_password">Forgot your password?</a>

          </div>

          <input type="password" class="w-full bg-white dark:bg-white/5 border border-gray-300 dark:border-white/10 rounded-xl px-4 py-3 text-black dark:text-white outline-none">

        </div>

        <button type="submit" class="w-full py-4 bg-black dark:bg-white text-white dark:text-black font-bold rounded-xl hover:bg-gray-800 dark:hover:bg-gray-200 transition-colors text-base tracking-heading" data-lang="nav_login">Log in</button>

      </form>

    </div>

    <div id="state-error-password" class="hidden animate-fade-in">

      <form onsubmit="event.preventDefault(); voltarParaLogin();">

        <div class="mb-5">

          <label class="block text-xs font-medium text-gray-700 dark:text-white/80 mb-2" data-lang="login_email_label">Email address</label>

          <input type="email" value="you@company.com" class="w-full bg-white dark:bg-white/5 border border-gray-300 dark:border-white/10 rounded-xl px-4 py-3 text-black dark:text-white placeholder-gray-400 dark:placeholder-white/30 outline-none transition-all">

        </div>

        <div class="mb-8">

          <div class="flex justify-between items-center mb-2">

            <label class="block text-xs font-medium text-gray-700 dark:text-white/80" data-lang="login_password_label">Password</label>

            <a href="#" class="text-xs text-gray-500 dark:text-gray-400 hover:text-black dark:hover:text-white font-medium transition-colors" data-lang="login_forgot_password">Forgot your password?</a>

          </div>

          <input type="password" value="wrongpass123" class="w-full bg-accent-red/10 border border-accent-red text-black dark:text-white rounded-xl px-4 py-3 focus:border-accent-red focus:ring-1 focus:ring-accent-red outline-none">

          <p class="mt-2 text-xs text-accent-red font-medium"><span data-lang="login_incorrect_pwd">Incorrect password.</span> <a href="#" class="text-black dark:text-white hover:underline"><span data-lang="login_try_again">Try again or reset it.</span></a></p>

        </div>

        <button type="submit" class="w-full py-4 bg-black dark:bg-white text-white dark:text-black font-bold rounded-xl hover:bg-gray-800 dark:hover:bg-gray-200 transition-colors text-base tracking-heading" data-lang="nav_login">Log in</button>

      </form>

    </div>

    <div id="state-success" class="hidden text-center py-6 animate-fade-in">

      <div class="w-24 h-24 bg-accent-green/20 rounded-full flex items-center justify-center mx-auto mb-8 border border-accent-green/30">

        <span class="material-symbols-outlined text-[48px] text-accent-green">check</span>

      </div>

      <h2 class="text-4xl font-bold text-black dark:text-white mb-3 tracking-heading"><span data-lang="login_account_created">Account created!</span></h2>

      <p class="text-gray-500 dark:text-white/60 mb-12 text-xl"><span data-lang="login_redirecting">Redirecting to the marketplace...</span></p>

      <div class="w-10 h-10 border-4 border-gray-200 dark:border-white/10 border-t-black dark:border-t-white rounded-full animate-spin mx-auto"></div>

    </div>

  </div>

  <div class="fixed bottom-6 right-6 bg-white/80 dark:bg-white/10 backdrop-blur-xl border border-gray-300 dark:border-white/10 p-4 rounded-2xl z-50 flex gap-2">

    <div class="text-xs uppercase font-bold text-gray-500 dark:text-white/50 absolute -top-3 left-4 bg-gray-200 dark:bg-black px-2 rounded-full border border-gray-300 dark:border-white/10 tracking-caps">Dev States</div>

    <button onclick="displayErrorMessage('email')" class="px-3 py-2 text-xs font-bold text-black dark:text-white bg-gray-200 dark:bg-gray-500/20 hover:bg-gray-300 dark:hover:bg-gray-500/40 rounded-lg border border-gray-300 dark:border-gray-500/30 transition-colors tracking-heading">Err: Email</button>

    <button onclick="displayErrorMessage('password')" class="px-3 py-2 text-xs font-bold text-black dark:text-white bg-gray-200 dark:bg-gray-500/20 hover:bg-gray-300 dark:hover:bg-gray-500/40 rounded-lg border border-gray-300 dark:border-gray-500/30 transition-colors tracking-heading">Err: Pass</button>

    <button onclick="displaySuccessMessage()" class="px-3 py-2 text-xs font-bold text-black dark:text-white bg-gray-200 dark:bg-gray-500/20 hover:bg-gray-300 dark:hover:bg-gray-500/40 rounded-lg border border-gray-300 dark:border-gray-500/30 transition-colors tracking-heading">Success</button>

  </div>

  <script src="../javascript/components/navbar.js"></script>

  <script src="../javascript/components/footer.js"></script>

  <script src="../javascript/components/satellite-card.js"></script>

  <script src="../javascript/data/satellites.js"></script>

  <script src="../javascript/components/drag-scroll.js"></script>

  <script src="../javascript/components/carousel.js"></script>

  <script src="../javascript/utils/componentLoader.js"></script>

  <script src="../javascript/utils/satelliteLoader.js"></script>

  <script src="../javascript/pages/login.js"></script>

  <script src="../javascript/utils/ui-components.js"></script>

</body>

</html>
