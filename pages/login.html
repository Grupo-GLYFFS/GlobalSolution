<!DOCTYPE html>

<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Log in • DataOrbit</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script src="../js/tailwind.config.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="icon" type="image/png" href="../assets/favicon/favicon-light.png" media="(prefers-color-scheme: light)">

  <link rel="icon" type="image/png" href="../assets/favicon/favicon-dark.png" media="(prefers-color-scheme: dark)">
  
</head>

<body class="font-sans text-gray-100 bg-black antialiased relative min-h-screen flex items-center justify-center p-6">

  <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-blue-900/20 via-black to-black z-0 pointer-events-none"></div>

  <div class="w-full max-w-md bg-white/10 backdrop-blur-xl border border-white/10 rounded-3xl shadow-2xl p-8 sm:p-10 relative z-10">

    <div class="flex justify-center mb-8">

      <a href="index.html" class="hover:opacity-80 transition-opacity">

        <img src="../assets/logo/dataorbit-logo-3.png" alt="DataOrbit Logo" class="h-10 brightness-0 invert">

      </a>

    </div>

    <ul id="auth-tabs" class="flex p-1 bg-white/5 rounded-xl mb-8 border border-white/5" data-tabs-toggle="#auth-tab-content" role="tablist" data-active-classes=" " data-inactive-classes=" ">

      <li class="flex-1" role="presentation">
        <button id="tab-login" data-tabs-target="#state-login" type="button" role="tab" aria-controls="state-login" aria-selected="true" class="w-full py-3 text-base font-bold rounded-lg transition-all aria-selected:bg-white aria-selected:text-black aria-selected:shadow-md text-white/50 hover:text-white hover:bg-white/5 aria-selected:hover:bg-white aria-selected:hover:text-black tracking-heading">Log in</button>
      </li>

      <li class="flex-1" role="presentation">
        <button id="tab-signup" data-tabs-target="#state-signup" type="button" role="tab" aria-controls="state-signup" aria-selected="false" class="w-full py-3 text-base font-bold rounded-lg transition-all aria-selected:bg-white aria-selected:text-black aria-selected:shadow-md text-white/50 hover:text-white hover:bg-white/5 aria-selected:hover:bg-white aria-selected:hover:text-black tracking-heading">Sign up</button>
      </li>

    </ul>

    <div id="auth-tab-content">
      <div id="state-login" class="hidden animate-fade-in" role="tabpanel" aria-labelledby="tab-login">

      <form onsubmit="event.preventDefault(); exibirErro('password');">

        <div class="mb-5">

          <label class="block text-xs font-medium text-white/80 mb-2">Email address</label>

          <input type="email" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-white/30 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-all" placeholder="you@company.com" required>

        </div>

        <div class="mb-8">

          <div class="flex justify-between items-center mb-2">

            <label class="block text-xs font-medium text-white/80">Password</label>

            <a href="#" class="text-xs text-blue-400 hover:text-blue-300 font-medium transition-colors">Forgot your password?</a>

          </div>

          <input type="password" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-all" required>

        </div>

        <button type="submit" class="w-full py-4 bg-white text-black font-bold rounded-xl hover:bg-gray-200 transition-colors shadow-lg shadow-white/10 text-base tracking-heading">Log in</button>

        <p class="text-center mt-6 text-xs text-white/50">

          Don't have an account? <a href="#" onclick="document.getElementById('tab-signup').click()" class="text-white hover:underline font-medium">Sign up</a>

        </p>

      </form>

      </div>

      <div id="state-signup" class="hidden animate-fade-in" role="tabpanel" aria-labelledby="tab-signup">

        <form onsubmit="event.preventDefault(); exibirSucesso();">

        <div class="mb-4">

          <label class="block text-xs font-medium text-white/80 mb-2">Full name</label>

          <input type="text" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-white/30 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-all" placeholder="John Doe" required>

        </div>

        <div class="mb-4">

          <label class="block text-xs font-medium text-white/80 mb-2">Email address</label>

          <input type="email" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-white/30 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-all" placeholder="you@company.com" required>

        </div>

        <div class="mb-8">

          <label class="block text-xs font-medium text-white/80 mb-2">Password</label>

          <input type="password" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-all" required>

        </div>

        <button type="submit" class="w-full py-4 bg-white text-black font-bold rounded-xl hover:bg-gray-200 transition-colors shadow-lg shadow-white/10 text-base tracking-heading">Create account</button>

        <p class="text-center mt-6 text-xs text-white/50">

          Already have an account? <a href="#" onclick="document.getElementById('tab-login').click()" class="text-white hover:underline font-medium">Log in</a>

        </p>

        </form>

      </div>
    </div>

    <div id="state-error-email" class="hidden animate-fade-in">

      <form onsubmit="event.preventDefault(); voltarParaLogin();">

        <div class="mb-5">

          <label class="block text-xs font-medium text-white/80 mb-2">Email address</label>

          <input type="email" value="unknown@email.com" class="w-full bg-red-500/10 border border-red-500 text-white rounded-xl px-4 py-3 focus:border-red-500 focus:ring-1 focus:ring-red-500 outline-none transition-all">

          <p class="mt-2 text-xs text-red-400 font-medium">No account found with this email. <a href="#" onclick="voltarParaCadastro()" class="text-white hover:underline">Sign up?</a></p>

        </div>

        <div class="mb-8">

          <div class="flex justify-between items-center mb-2">

            <label class="block text-xs font-medium text-white/80">Password</label>

            <a href="#" class="text-xs text-blue-400 hover:text-blue-300 font-medium transition-colors">Forgot your password?</a>

          </div>

          <input type="password" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white outline-none">

        </div>

        <button type="submit" class="w-full py-4 bg-white text-black font-bold rounded-xl hover:bg-gray-200 transition-colors shadow-lg shadow-white/10 text-base tracking-heading">Log in</button>

      </form>

    </div>

    <div id="state-error-password" class="hidden animate-fade-in">

      <form onsubmit="event.preventDefault(); voltarParaLogin();">

        <div class="mb-5">

          <label class="block text-xs font-medium text-white/80 mb-2">Email address</label>

          <input type="email" value="you@company.com" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-white/30 outline-none transition-all">

        </div>

        <div class="mb-8">

          <div class="flex justify-between items-center mb-2">

            <label class="block text-xs font-medium text-white/80">Password</label>

            <a href="#" class="text-xs text-blue-400 hover:text-blue-300 font-medium transition-colors">Forgot your password?</a>

          </div>

          <input type="password" value="wrongpass123" class="w-full bg-red-500/10 border border-red-500 text-white rounded-xl px-4 py-3 focus:border-red-500 focus:ring-1 focus:ring-red-500 outline-none">

          <p class="mt-2 text-xs text-red-400 font-medium">Incorrect password. <a href="#" class="text-white hover:underline">Try again or reset it.</a></p>

        </div>

        <button type="submit" class="w-full py-4 bg-white text-black font-bold rounded-xl hover:bg-gray-200 transition-colors shadow-lg shadow-white/10 text-base tracking-heading">Log in</button>

      </form>

    </div>

    <div id="state-success" class="hidden text-center py-6 animate-fade-in">

      <div class="w-24 h-24 bg-emerald-500/20 rounded-full flex items-center justify-center mx-auto mb-8 border border-emerald-500/30">

        <svg class="w-12 h-12 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">

          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />

        </svg>

      </div>

      <h2 class="text-4xl font-bold text-white mb-3 tracking-heading">Account created!</h2>

      <p class="text-white/60 mb-12 text-xl">Redirecting to the marketplace...</p>

      <div class="w-10 h-10 border-4 border-white/10 border-t-white rounded-full animate-spin mx-auto"></div>

    </div>

  </div>

  <div class="fixed bottom-6 right-6 bg-white/10 backdrop-blur-xl border border-white/10 p-4 rounded-2xl z-50 flex gap-2">

    <div class="text-xs uppercase font-bold text-white/50 absolute -top-3 left-4 bg-black px-2 rounded-full border border-white/10 tracking-caps">Dev States</div>

    <button onclick="exibirErro('email')" class="px-3 py-2 text-xs font-bold text-white bg-red-500/20 hover:bg-red-500/40 rounded-lg border border-red-500/30 transition-colors tracking-heading">Err: Email</button>

    <button onclick="exibirErro('password')" class="px-3 py-2 text-xs font-bold text-white bg-red-500/20 hover:bg-red-500/40 rounded-lg border border-red-500/30 transition-colors tracking-heading">Err: Pass</button>

    <button onclick="exibirSucesso()" class="px-3 py-2 text-xs font-bold text-white bg-emerald-500/20 hover:bg-emerald-500/40 rounded-lg border border-emerald-500/30 transition-colors tracking-heading">Success</button>

  </div>

  <script type="module" src="../js/pages/login.js"></script>
  
  <script src="https://cdn.jsdelivr.net/npm/flowbite@2.5.2/dist/flowbite.min.js"></script>
  
</body>

</html>
